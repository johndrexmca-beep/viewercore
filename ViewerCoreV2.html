<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Image Prompter</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    background: #000;
    height: 100%;
    overflow: hidden;
    font-family: Arial, sans-serif;
  }

  /* ---------- Home screen ---------- */
  #home {
    position: fixed;
    inset: 0;
    background: #111;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 20;
    padding: 24px;
    box-sizing: border-box;
  }
  #homeInner {
    width: min(560px, 92vw);
    max-height: 90vh;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  #dropzone {
    padding: 32px;
    border: 2px dashed #444;
    border-radius: 16px;
    text-align: center;
    color: #ccc;
    transition: border-color 0.2s, background 0.2s;
    flex-shrink: 0;
  }
  #dropzone.drag {
    border-color: #4fd1c5;
    background: rgba(79, 209, 197, 0.06);
  }
  #dropzone h1 {
    font-size: 22px;
    font-weight: 600;
    margin: 0 0 10px;
    color: #fff;
    letter-spacing: 0.3px;
  }
  #dropzone .quote {
    font-size: 14px;
    color: #4fd1c5;
    font-style: italic;
    margin: 0 0 22px;
  }
  #fileInput, #listInput { display: none; }
  #chooseBtn {
    display: inline-block;
    padding: 10px 24px;
    background: #4fd1c5;
    color: #06201d;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
  }
  #chooseBtn:hover { background: #6be0d5; }

  #listActions {
    display: flex;
    gap: 8px;
    justify-content: center;
    margin-top: 14px;
  }
  .secondaryBtn {
    background: #232323;
    color: #ccc;
    border: 1px solid #333;
    padding: 8px 14px;
    border-radius: 8px;
    font-size: 12px;
    cursor: pointer;
  }
  .secondaryBtn:hover { background: #2c2c2c; color: #fff; }

  #playlist {
    background: #1a1a1a;
    border-radius: 12px;
    overflow-y: auto;
    flex: 1;
    min-height: 0;
  }
  #playlist:empty::after {
    content: 'Playlist is empty. Add images above.';
    display: block;
    padding: 20px;
    color: #666;
    font-size: 13px;
    text-align: center;
  }
  .item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 10px;
    border-bottom: 1px solid #262626;
    cursor: pointer;
  }
  .item:last-child { border-bottom: none; }
  .item:hover { background: #232323; }
  .item.active { background: #1f3733; }
  .item img {
    width: 40px;
    height: 40px;
    object-fit: cover;
    border-radius: 6px;
    flex-shrink: 0;
    background: #000;
  }
  .item .name {
    flex: 1;
    font-size: 13px;
    color: #ddd;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .item button {
    background: none;
    border: none;
    color: #888;
    cursor: pointer;
    font-size: 14px;
    padding: 4px 8px;
    border-radius: 6px;
    line-height: 1;
  }
  .item button:hover { background: #333; color: #fff; }
  .item .remove:hover { color: #f87171; }

  /* ---------- Viewer screen (fullscreen, no text) ---------- */
  #viewer {
    position: fixed;
    inset: 0;
    background: #000;
    display: none;
  }
  #viewport {
    position: absolute;
    inset: 0;
    overflow: hidden;
  }
  #img {
    position: absolute;
    top: 0;
    left: 0;
    width: 100vw;
    transform: translateY(0px);
    display: block;
    user-select: none;
    -webkit-user-drag: none;
  }

  /* ---------- Hotkey guide (right side, home screen) ---------- */
  #hotkeyPanel {
    position: fixed;
    top: 16px;
    right: 16px;
    background: rgba(255, 255, 255, 0.05);
    color: #ccc;
    font-size: 11px;
    line-height: 1.7;
    padding: 12px 16px;
    border-radius: 10px;
    z-index: 25;
    pointer-events: none;
    max-width: 220px;
    white-space: nowrap;
  }
  #hotkeyPanel .row { display: flex; justify-content: space-between; gap: 14px; }
  #hotkeyPanel .k { color: #4fd1c5; font-weight: 600; }

  /* ---------- Playlist drawer (F1 popup) ---------- */
  #listDrawer {
    position: fixed;
    top: 0;
    right: 0;
    height: 100%;
    width: min(320px, 80vw);
    background: rgba(17, 17, 17, 0.85);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    transform: translateX(100%);
    transition: transform 0.25s ease;
    z-index: 30;
    display: flex;
    flex-direction: column;
  }
  #listDrawer.open { transform: translateX(0); }
  #listDrawer .drawerHeader {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 14px;
    border-bottom: 1px solid #333;
    color: #ddd;
    font-size: 13px;
    flex-shrink: 0;
  }
  #drawerList {
    flex: 1;
    overflow-y: auto;
  }
  #drawerList:empty::after {
    content: 'Playlist is empty.';
    display: block;
    padding: 20px;
    color: #666;
    font-size: 13px;
    text-align: center;
  }
  #listDrawer .drawerActions {
    padding: 10px 14px;
    border-bottom: 1px solid #333;
    flex-shrink: 0;
  }
  #listDrawer .drawerActions .secondaryBtn {
    width: 100%;
    box-sizing: border-box;
  }
  .item[draggable="true"] { cursor: grab; }
  .item.dragging { opacity: 0.4; }
  .item.drag-over { border-top: 2px solid #4fd1c5; }
  #closeTab {
    position: absolute;
    top: 50%;
    left: -28px;
    transform: translateY(-50%);
    width: 28px;
    height: 56px;
    background: rgba(255, 255, 255, 0.12);
    border-radius: 8px 0 0 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    color: #eee;
    font-size: 14px;
  }
  #closeTab:hover { background: rgba(255, 255, 255, 0.22); }
</style>
</head>
<body>

<div id="home">
  <div id="hotkeyPanel">
    <div class="row"><span class="k">Space</span><span>Start / Stop</span></div>
    <div class="row"><span class="k">1-9</span><span>Speed down</span></div>
    <div class="row"><span class="k">Q-O</span><span>Speed up (rev)</span></div>
    <div class="row"><span class="k">PgUp</span><span>Down x2</span></div>
    <div class="row"><span class="k">PgDn</span><span>Up x2</span></div>
    <div class="row"><span class="k">&#8593;</span><span>Fast down</span></div>
    <div class="row"><span class="k">&#8595;</span><span>Fast up</span></div>
    <div class="row"><span class="k">F10</span><span>Prev image</span></div>
    <div class="row"><span class="k">F12</span><span>Next image</span></div>
    <div class="row"><span class="k">F5</span><span>Add images</span></div>
    <div class="row"><span class="k">F1</span><span>Playlist</span></div>
    <div class="row"><span class="k">Esc</span><span>Home</span></div>
  </div>
  <div id="homeInner">
    <div id="dropzone">
      <h1>Image Prompter</h1>
      <p class="quote">"Christian unity found in love."</p>
      <label id="chooseBtn" for="fileInput">Choose images</label>
      <input type="file" id="fileInput" accept="image/*" multiple>
      <div id="listActions">
        <button type="button" class="secondaryBtn" id="importBtn">Import .list</button>
        <button type="button" class="secondaryBtn" id="exportBtn">Export .list</button>
      </div>
      <input type="file" id="listInput" accept=".list">
    </div>
    <div id="playlist"></div>
  </div>
</div>

<div id="viewer">
  <div id="viewport">
    <img id="img" alt="">
  </div>

  <div id="listDrawer">
    <div id="closeTab" title="Close">&#10005;</div>
    <div class="drawerHeader">
      <span>Playlist</span>
      <button type="button" class="secondaryBtn" id="drawerCloseBtn">Close</button>
    </div>
    <div class="drawerActions">
      <button type="button" class="secondaryBtn" id="drawerChooseBtn">Choose images</button>
    </div>
    <div id="drawerList"></div>
  </div>
</div>

<script>
(function () {
  const home = document.getElementById('home');
  const dropzone = document.getElementById('dropzone');
  const playlistEl = document.getElementById('playlist');
  const drawerListEl = document.getElementById('drawerList');
  const listDrawer = document.getElementById('listDrawer');
  const viewer = document.getElementById('viewer');
  const fileInput = document.getElementById('fileInput');
  const listInput = document.getElementById('listInput');
  const img = document.getElementById('img');
  const viewport = document.getElementById('viewport');

  const reverseKeys = ['q','w','e','r','t','y','u','i','o'];
  const PX_PER_LEVEL = 0.6;

  let playlist = [];      // { url, name, file }
  let currentIndex = -1;

  let speed = 1;          // persists across images, default 1
  let direction = 1;      // persists across images, default forward
  let running = false;
  let position = 0;
  let rafId = null;
  let wasFullscreen = false;
  let dragSrcIndex = null;

  // ---------- Playlist management ----------

  function addFiles(fileList) {
    const files = Array.from(fileList).filter(f => f.type.startsWith('image/'));
    files.forEach(function (file) {
      playlist.push({ url: URL.createObjectURL(file), name: file.name, file: file });
    });
    renderPlaylist();
  }

  function renderPlaylist() {
    [playlistEl, drawerListEl].forEach(function (container) {
      container.innerHTML = '';
      playlist.forEach(function (item, i) {
        const row = document.createElement('div');
        row.className = 'item' + (i === currentIndex ? ' active' : '');

        const thumb = document.createElement('img');
        thumb.src = item.url;
        row.appendChild(thumb);

        const name = document.createElement('div');
        name.className = 'name';
        name.textContent = item.name;
        row.appendChild(name);

        const up = document.createElement('button');
        up.textContent = '\u2191';
        up.title = 'Move up';
        up.onclick = function (e) { e.stopPropagation(); moveItem(i, -1); };
        row.appendChild(up);

        const down = document.createElement('button');
        down.textContent = '\u2193';
        down.title = 'Move down';
        down.onclick = function (e) { e.stopPropagation(); moveItem(i, 1); };
        row.appendChild(down);

        const remove = document.createElement('button');
        remove.textContent = '\u2715';
        remove.className = 'remove';
        remove.title = 'Remove';
        remove.onclick = function (e) { e.stopPropagation(); removeItem(i); };
        row.appendChild(remove);

        row.onclick = function () { openIndex(i); closeDrawer(); };

        row.draggable = true;
        row.addEventListener('dragstart', function (e) {
          dragSrcIndex = i;
          row.classList.add('dragging');
          e.dataTransfer.effectAllowed = 'move';
          try { e.dataTransfer.setData('text/plain', String(i)); } catch (err) {}
        });
        row.addEventListener('dragend', function () {
          row.classList.remove('dragging');
        });
        row.addEventListener('dragover', function (e) {
          e.preventDefault();
          e.dataTransfer.dropEffect = 'move';
          row.classList.add('drag-over');
        });
        row.addEventListener('dragleave', function () {
          row.classList.remove('drag-over');
        });
        row.addEventListener('drop', function (e) {
          e.preventDefault();
          row.classList.remove('drag-over');
          if (dragSrcIndex === null || dragSrcIndex === i) return;
          reorderItem(dragSrcIndex, i);
          dragSrcIndex = null;
        });

        container.appendChild(row);
      });
    });
  }

  function moveItem(i, dir) {
    const j = i + dir;
    if (j < 0 || j >= playlist.length) return;
    const tmp = playlist[i];
    playlist[i] = playlist[j];
    playlist[j] = tmp;
    if (currentIndex === i) currentIndex = j;
    else if (currentIndex === j) currentIndex = i;
    renderPlaylist();
  }

  function reorderItem(from, to) {
    if (from === to) return;
    const item = playlist.splice(from, 1)[0];
    playlist.splice(to, 0, item);
    if (currentIndex === from) {
      currentIndex = to;
    } else if (from < currentIndex && to >= currentIndex) {
      currentIndex -= 1;
    } else if (from > currentIndex && to <= currentIndex) {
      currentIndex += 1;
    }
    renderPlaylist();
  }

  function removeItem(i) {
    playlist.splice(i, 1);
    if (currentIndex === i) currentIndex = -1;
    else if (currentIndex > i) currentIndex -= 1;
    renderPlaylist();
  }

  // ---------- Import / Export ----------

  function exportPlaylist() {
    if (!playlist.length) return;
    Promise.all(playlist.map(function (p) {
      if (p.file) {
        return new Promise(function (resolve) {
          const reader = new FileReader();
          reader.onload = function () { resolve({ name: p.name, data: reader.result }); };
          reader.readAsDataURL(p.file);
        });
      }
      return Promise.resolve({ name: p.name, data: p.url });
    })).then(function (results) {
      const blob = new Blob([JSON.stringify(results)], { type: 'application/json' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'playlist.list';
      document.body.appendChild(a);
      a.click();
      a.remove();
    });
  }

  function importPlaylist(file) {
    const reader = new FileReader();
    reader.onload = function (e) {
      try {
        const data = JSON.parse(e.target.result);
        data.forEach(function (entry) {
          playlist.push({ url: entry.data, name: entry.name, file: null });
        });
        renderPlaylist();
      } catch (err) {
        alert('Invalid .list file.');
      }
    };
    reader.readAsText(file);
  }

  // ---------- Viewer ----------

  function openIndex(i) {
    if (i < 0 || i >= playlist.length) return;
    currentIndex = i;
    stop();
    position = 0;
    img.src = playlist[i].url;
    img.style.transform = 'translateY(0px)';

    home.style.display = 'none';
    viewer.style.display = 'block';
    renderPlaylist();

    if (document.documentElement.requestFullscreen) {
      document.documentElement.requestFullscreen().catch(function () {});
    }
  }

  function nextImage() {
    if (!playlist.length) return;
    const i = (currentIndex + 1) % playlist.length;
    openIndex(i);
  }

  function prevImage() {
    if (!playlist.length) return;
    const i = (currentIndex - 1 + playlist.length) % playlist.length;
    openIndex(i);
  }

  function backToHome() {
    stop();
    closeDrawer();
    viewer.style.display = 'none';
    home.style.display = 'flex';
    if (document.fullscreenElement) document.exitFullscreen();
  }

  function maxScroll() {
    const vpHeight = viewport.clientHeight;
    const imgHeight = img.clientHeight;
    return Math.max(0, imgHeight - vpHeight);
  }

  function setSpeed(level, dir) {
    speed = level;
    direction = dir;
    if (!running) start();
  }

  function start() {
    if (running) return;
    if (!speed) speed = 1;
    if (!direction) direction = 1;
    running = true;
    tick();
  }

  function stop() {
    running = false;
    if (rafId) cancelAnimationFrame(rafId);
    rafId = null;
  }

  function tick() {
    if (!running) return;
    const maxPos = maxScroll();
    position += direction * speed * PX_PER_LEVEL;

    if (position <= 0) {
      position = 0;
      stop();
    } else if (position >= maxPos) {
      position = maxPos;
      stop();
    }

    img.style.transform = 'translateY(-' + position + 'px)';

    if (running) rafId = requestAnimationFrame(tick);
  }

  function toggleStartStop() {
    if (running) {
      stop();
    } else {
      start();
    }
  }

  // ---------- Playlist drawer (F1) ----------

  function toggleDrawer() {
    listDrawer.classList.toggle('open');
  }

  function closeDrawer() {
    listDrawer.classList.remove('open');
  }

  document.getElementById('closeTab').onclick = closeDrawer;
  document.getElementById('drawerCloseBtn').onclick = closeDrawer;
  document.getElementById('drawerChooseBtn').onclick = function () {
    wasFullscreen = !!document.fullscreenElement;
    fileInput.click();
  };

  // ---------- Input wiring ----------

  fileInput.addEventListener('change', function (e) {
    addFiles(e.target.files);
    fileInput.value = '';
    if (wasFullscreen && !document.fullscreenElement && document.documentElement.requestFullscreen) {
      document.documentElement.requestFullscreen().catch(function () {});
    }
  });

  listInput.addEventListener('change', function (e) {
    if (e.target.files && e.target.files[0]) {
      importPlaylist(e.target.files[0]);
    }
    listInput.value = '';
  });

  document.getElementById('importBtn').addEventListener('click', function () {
    listInput.click();
  });
  document.getElementById('exportBtn').addEventListener('click', exportPlaylist);

  ['dragenter', 'dragover'].forEach(function (evt) {
    dropzone.addEventListener(evt, function (e) {
      e.preventDefault();
      dropzone.classList.add('drag');
    });
  });
  ['dragleave', 'drop'].forEach(function (evt) {
    dropzone.addEventListener(evt, function (e) {
      e.preventDefault();
      dropzone.classList.remove('drag');
    });
  });
  dropzone.addEventListener('drop', function (e) {
    addFiles(e.dataTransfer.files);
  });

  document.addEventListener('keydown', function (e) {
    const key = e.key;

    // Global shortcuts, available on both home and viewer screens
    if (key === 'F5') {
      e.preventDefault();
      wasFullscreen = !!document.fullscreenElement;
      fileInput.click();
      return;
    }
    if (key === 'F10') {
      e.preventDefault();
      prevImage();
      return;
    }
    if (key === 'F12') {
      e.preventDefault();
      nextImage();
      return;
    }

    if (viewer.style.display !== 'block') return;

    if (key === 'F1') {
      e.preventDefault();
      toggleDrawer();
      return;
    }

    if (key === ' ' || e.code === 'Space') {
      e.preventDefault();
      if (!e.repeat) toggleStartStop();
      return;
    }

    if (/^[1-9]$/.test(key)) {
      setSpeed(parseInt(key, 10), 1);
      return;
    }

    const lower = key.toLowerCase();
    const idx = reverseKeys.indexOf(lower);
    if (idx !== -1) {
      setSpeed(idx + 1, -1);
      return;
    }


    if (key==='PageUp'){position=Math.min(maxScroll(),position+viewport.clientHeight*2);img.style.transform='translateY(-'+position+'px)';e.preventDefault();return;}
    if (key==='PageDown'){position=Math.max(0,position-viewport.clientHeight*2);img.style.transform='translateY(-'+position+'px)';e.preventDefault();return;}
    if (key==='ArrowUp'){stop();position=Math.min(maxScroll(),position+80);img.style.transform='translateY(-'+position+'px)';e.preventDefault();return;}
    if (key==='ArrowDown'){stop();position=Math.max(0,position-80);img.style.transform='translateY(-'+position+'px)';e.preventDefault();return;}
    if (key === 'Escape') {
      if (listDrawer.classList.contains('open')) {
        closeDrawer();
      } else {
        backToHome();
      }
    }
  });

  window.addEventListener('resize', function () {
    const maxPos = maxScroll();
    if (position > maxPos) position = maxPos;
    img.style.transform = 'translateY(-' + position + 'px)';
  });
})();
</script>

</body>
</html>
